{% load i18n static %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% trans "Funding databank" %}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'fonds/favicon.svg' %}">
    <style>
        :root {
            --zs-navy: #123f78;
            --zs-navy-dark: #0d315d;
            --zs-cyan: #8fd7eb;
            --zs-cyan-light: #d7f4fb;
            --zs-turquoise: #43b5bf;
            --zs-turquoise-soft: #78d2d7;
            --zs-surface: #f4fbfd;
            --zs-border: #b6e3ee;
            --zs-text: #163251;
            --zs-muted: #4e6f8d;
            --zs-success-bg: #dff7f7;
            --zs-success-border: #72c9cf;
            --zs-shadow: 0 12px 32px rgba(18, 63, 120, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            line-height: 1.5;
            color: var(--zs-text);
            background:
                radial-gradient(circle at top right, rgba(67, 181, 191, 0.28), transparent 28%),
                radial-gradient(circle at 92% 20%, rgba(18, 63, 120, 0.16), transparent 18%),
                linear-gradient(90deg, var(--zs-navy) 0%, var(--zs-navy) 50%, var(--zs-turquoise) 50%, var(--zs-turquoise-soft) 100%);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.22;
            background:
                radial-gradient(circle at 84% 18%, var(--zs-navy) 0 2px, transparent 3px) 0 0 / 14px 14px,
                radial-gradient(circle at 86% 26%, var(--zs-navy) 0 1.5px, transparent 2.5px) 0 0 / 18px 18px;
            mask: radial-gradient(circle at 83% 24%, black 0, transparent 42%);
        }

        .page-shell {
            max-width: 1080px;
            margin: 2rem auto;
            padding: 0 1.25rem 2rem;
        }

        .page-card {
            background: rgba(244, 251, 253, 0.96);
            border: 1px solid rgba(182, 227, 238, 0.9);
            border-radius: 24px;
            box-shadow: var(--zs-shadow);
            overflow: hidden;
            backdrop-filter: blur(6px);
        }

        nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:1rem;
            flex-wrap:wrap;
            padding: 1.25rem 1.5rem;
            background: linear-gradient(90deg, rgba(18, 63, 120, 0.98), rgba(67, 181, 191, 0.95));
        }

        nav .nav-links {
            display:flex;
            flex-wrap:wrap;
            gap:.75rem;
        }

        nav .nav-links a {
            margin-right: 0;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: .5rem .8rem;
            border-radius: 999px;
            transition: background-color .2s ease, transform .2s ease;
        }

        nav .nav-links a:hover,
        nav .nav-links a:focus-visible {
            background: rgba(215, 244, 251, 0.18);
            transform: translateY(-1px);
        }

        .content {
            padding: 1.5rem;
        }

        hr {
            margin: 0;
            border: 0;
            border-top: 1px solid var(--zs-border);
        }

        h1, h2, h3 {
            color: var(--zs-navy);
        }

        a {
            color: var(--zs-navy);
        }

        a:hover,
        a:focus-visible {
            color: var(--zs-turquoise);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid rgba(182, 227, 238, 0.8);
            padding: 0.7rem 0.75rem;
            vertical-align: top;
        }

        th {
            background: linear-gradient(90deg, var(--zs-cyan-light), #eefbfd);
            text-align: left;
            color: var(--zs-navy);
        }

        tr:nth-child(even) td {
            background: rgba(215, 244, 251, 0.22);
        }

        .muted {
            color: var(--zs-muted);
        }

        .actions a {
            margin-right: .5rem;
        }

        .success {
            background: var(--zs-success-bg);
            border: 1px solid var(--zs-success-border);
            color: var(--zs-navy);
            padding: .75rem .9rem;
            border-radius: 14px;
        }

        form .field {
            margin: .9rem 0;
        }

        form label {
            display:block;
            font-weight:600;
            margin-bottom:.25rem;
            color: var(--zs-navy);
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width:100%;
            padding:.65rem .75rem;
            box-sizing:border-box;
            border: 1px solid var(--zs-border);
            border-radius: 12px;
            background: #fff;
            color: var(--zs-text);
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--zs-turquoise);
            box-shadow: 0 0 0 3px rgba(67, 181, 191, 0.18);
        }

        .btn {
            display:inline-block;
            padding:.55rem .95rem;
            border:1px solid transparent;
            text-decoration:none;
            background: linear-gradient(135deg, var(--zs-navy), var(--zs-turquoise));
            color:#fff;
            cursor:pointer;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: 0 6px 18px rgba(18, 63, 120, 0.15);
            transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            color: #fff;
            filter: brightness(1.04);
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(18, 63, 120, 0.2);
        }

        .language-switcher {
            display:flex;
            align-items:center;
            gap:.5rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            padding: .45rem .6rem;
            border-radius: 999px;
        }

        .language-switcher label {
            margin: 0;
            color: #fff;
        }

        .language-switcher select {
            width: auto;
            min-width: 8rem;
            background: rgba(255, 255, 255, 0.94);
        }

        @media (max-width: 720px) {
            .page-shell {
                margin: 1rem auto;
                padding: 0 .75rem 1rem;
            }

            nav,
            .content {
                padding: 1rem;
            }

            .language-switcher {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="page-card">
            <nav>
                <div class="nav-links">
                    <a href="/">{% trans "Home" %}</a>
                    <a href="/organizations/">{% trans "Organizations" %}</a>
                    <a href="/targets/">{% trans "Target groups" %}</a>
                    <a href="/api/organizations/">API</a>
                </div>
                <form class="language-switcher" action="/i18n/setlang/" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.get_full_path }}">
                    <label for="language-select">{% trans "Language" %}</label>
                    <select id="language-select" name="language" onchange="this.form.submit()">
                        {% get_current_language as CURRENT_LANGUAGE %}
                        {% get_available_languages as AVAILABLE_LANGUAGES %}
                        {% for lang_code, lang_name in AVAILABLE_LANGUAGES %}
                        <option value="{{ lang_code }}" {% if lang_code == CURRENT_LANGUAGE %}selected{% endif %}>{{ lang_name }}</option>
                        {% endfor %}
                    </select>
                </form>
            </nav>
            <hr>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
