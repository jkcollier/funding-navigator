services:
  db:
    image: postgres:17
    container_name: test2_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: test2_web
    restart: unless-stopped
    command: tail -f /dev/null # Replace with your script entrypoint as needed
    ###     command: >
    ###       sh -c "
    ###       python manage.py migrate &&
    ###       python manage.py collectstatic --noinput &&
    ###       gunicorn config.wsgi:application --bind 0.0.0.0:9000
    ###       "
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
